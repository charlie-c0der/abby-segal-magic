<svg viewBox="0 0 180 50" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .signature-text {
        font-family: 'Dancing Script', 'Brush Script MT', cursive, serif;
        font-size: 24px;
        font-weight: 500;
        fill: #0F0E15;
        stroke: #0F0E15;
        stroke-width: 0.2;
        paint-order: stroke fill;
      }
      .signature-flourish {
        stroke: #0F0E15;
        stroke-width: 1.5;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0.8;
      }
    </style>
  </defs>
  
  <!-- Main signature text -->
  <text class="signature-text" x="15" y="30">Abby Segal</text>
  
  <!-- Decorative underline -->
  <path class="signature-flourish" 
        d="M15,38 Q60,32 90,35 Q120,38 150,35" />
  
  <!-- Elegant swirl at the end -->
  <path class="signature-flourish" 
        d="M150,28 Q160,22 165,26 Q170,30 165,32 Q160,34 158,30" />
</svg>