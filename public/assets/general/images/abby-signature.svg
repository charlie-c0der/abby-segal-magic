<svg viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="inkGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a2a2a;stop-opacity:1" />
    </linearGradient>
    <filter id="inkBlur">
      <feGaussianBlur stdDeviation="0.3"/>
    </filter>
  </defs>
  
  <!-- Handwritten "Abby" with natural curves -->
  <path d="M15,35 Q20,25 28,30 Q35,35 40,30 L45,25 Q50,30 55,25" 
        stroke="url(#inkGradient)" stroke-width="2.5" fill="none" 
        stroke-linecap="round" stroke-linejoin="round" filter="url(#inkBlur)"/>
  
  <!-- "A" starting stroke -->
  <path d="M15,35 Q18,28 22,32 Q25,35 28,30" 
        stroke="url(#inkGradient)" stroke-width="2.2" fill="none" 
        stroke-linecap="round"/>
  
  <!-- "bby" flowing script -->
  <path d="M28,30 Q32,38 38,32 Q42,28 45,32 Q48,36 52,30 Q55,26 58,30" 
        stroke="url(#inkGradient)" stroke-width="2" fill="none" 
        stroke-linecap="round"/>
  
  <!-- Space and "Segal" -->
  <path d="M70,32 Q75,26 80,30 Q85,34 90,28 Q95,25 100,30 Q105,35 110,30 Q115,25 120,32 Q125,36 130,30" 
        stroke="url(#inkGradient)" stroke-width="2.2" fill="none" 
        stroke-linecap="round"/>
  
  <!-- Elegant finishing flourish -->
  <path d="M130,30 Q140,25 145,28 Q150,32 145,35 Q140,38 135,35 Q130,32 135,30" 
        stroke="url(#inkGradient)" stroke-width="1.8" fill="none" 
        stroke-linecap="round" opacity="0.9"/>
  
  <!-- Subtle underline with character -->
  <path d="M15,42 Q60,38 100,40 Q120,42 135,39" 
        stroke="url(#inkGradient)" stroke-width="1.2" fill="none" 
        stroke-linecap="round" opacity="0.7"/>
  
  <!-- Ink dots for authenticity -->
  <circle cx="25" cy="36" r="0.8" fill="url(#inkGradient)" opacity="0.6"/>
  <circle cx="85" cy="33" r="0.6" fill="url(#inkGradient)" opacity="0.5"/>
</svg>