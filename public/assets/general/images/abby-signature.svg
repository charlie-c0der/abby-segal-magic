<svg viewBox="0 0 220 70" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .signature-text {
        font-family: 'Dancing Script', 'Brush Script MT', cursive, serif;
        font-size: 32px;
        font-weight: 600;
        fill: #EDE6DA;
        stroke: #EDE6DA;
        stroke-width: 0.3;
        paint-order: stroke fill;
      }
      .signature-flourish {
        stroke: #C9A84C;
        stroke-width: 2;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
  </defs>
  
  <!-- Decorative flourish under signature -->
  <path class="signature-flourish" 
        d="M15,55 Q60,45 100,50 T180,52 Q200,48 210,55" 
        opacity="0.7"/>
  
  <!-- Main signature text -->
  <text class="signature-text" x="20" y="40">Abby Segal</text>
  
  <!-- Elegant swirl at the end -->
  <path class="signature-flourish" 
        d="M170,35 Q185,25 190,30 Q195,35 188,38 Q182,40 180,35" 
        opacity="0.8"/>
</svg>